name: Poll Telegram Alerts

on:
  schedule:
    - cron: "* * * * *"  # every minute
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Detect alarm and process round
        run: |
          python3 << 'PYEOF'
          import json, re, sys, time, html as html_mod, urllib.request
          from datetime import datetime, timezone

          FIREBASE_URL  = "https://shelter-bet-default-rtdb.firebaseio.com"
          SECRET        = "${{ secrets.FIREBASE_DB_SECRET }}"
          CHANNEL       = "red_color"
          TG_URL        = f"https://t.me/s/{CHANNEL}"

          ALARM_CITY    = "גבעתיים"
          ALARM_KEYWORD = "ירי רקטות"
          END_KEYWORD   = "סיום אירוע"

          def fb_get(path):
            try:
              req = urllib.request.Request(f"{FIREBASE_URL}/{path}.json?auth={SECRET}")
              with urllib.request.urlopen(req, timeout=10) as r:
                return json.loads(r.read().decode("utf-8"))
            except Exception as e:
              print(f"Firebase GET error ({path}): {e}"); return None

          def fb_put(path, data):
            try:
              body = json.dumps(data).encode("utf-8")
              req  = urllib.request.Request(f"{FIREBASE_URL}/{path}.json?auth={SECRET}",
                       data=body, method="PUT", headers={"Content-Type": "application/json"})
              with urllib.request.urlopen(req, timeout=10) as r:
                return json.loads(r.read().decode("utf-8"))
            except Exception as e:
              print(f"Firebase PUT error ({path}): {e}"); return None

          def fb_patch(path, data):
            try:
              body = json.dumps(data).encode("utf-8")
              req  = urllib.request.Request(f"{FIREBASE_URL}/{path}.json?auth={SECRET}",
                       data=body, method="PATCH", headers={"Content-Type": "application/json"})
              with urllib.request.urlopen(req, timeout=10) as r:
                return json.loads(r.read().decode("utf-8"))
            except Exception as e:
              print(f"Firebase PATCH error ({path}): {e}"); return None

          def fetch_channel():
            headers = {
              "User-Agent": "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36",
              "Accept-Language": "he,en;q=0.9",
            }
            req = urllib.request.Request(TG_URL, headers=headers)
            with urllib.request.urlopen(req, timeout=10) as r:
              return r.read().decode("utf-8")

          def parse_messages(page_html):
            """Return list of (msg_id, text, ts_ms) sorted by msg_id ascending."""
            results = []
            blocks = re.split(r'(?=data-post="' + CHANNEL + r'/\d+")', page_html)
            for block in blocks[1:]:
              m_id = re.search(r'data-post="' + CHANNEL + r'/(\d+)"', block)
              if not m_id:
                continue
              msg_id = int(m_id.group(1))

              # Extract ISO timestamp
              m_time = re.search(r'datetime="([^"]+)"', block)
              ts_ms = int(time.time() * 1000)
              if m_time:
                try:
                  dt = datetime.fromisoformat(m_time.group(1))
                  ts_ms = int(dt.timestamp() * 1000)
                except Exception:
                  pass

              # Extract message text
              m_text = re.search(
                r'tgme_widget_message_text[^>]*>(.*?)</div>', block, re.DOTALL)
              text = ""
              if m_text:
                raw = m_text.group(1)
                text = re.sub(r'<[^>]+>', ' ', raw)
                text = html_mod.unescape(text).strip()

              results.append((msg_id, text, ts_ms))

            results.sort(key=lambda x: x[0])
            return results

          # ── Close round on alarm ──────────────────────────────────────────────
          def close_round(alarm_ts):
            current = fb_get("sb_current")
            if not current:
              print("No current round — recording alarm only")
              fb_put("sb_last_alarm", alarm_ts); return

            if not current.get("open"):
              print("Round already closed — skipping alarm"); return

            round_created = current.get("createdAt", 0)
            if alarm_ts <= round_created:
              print(f"Alarm ts {alarm_ts} <= round start {round_created} — skipping"); return

            last_alarm = fb_get("sb_last_alarm") or 0
            if alarm_ts == last_alarm:
              print("Alarm already processed — skipping"); return

            bets = current.get("bets") or {}
            winner, min_diff = None, float("inf")
            for uid, bet in bets.items():
              diff = abs((bet.get("ts") or 0) - alarm_ts)
              if diff < min_diff:
                min_diff, winner = diff, uid
            print(f"Winner: {winner}, diff: {min_diff}ms")

            now = int(time.time() * 1000)
            done_round = {**current, "open": False, "alarmAt": alarm_ts,
                          "winnerId": winner, "completedAt": now}
            all_rounds = fb_get("sb_rounds") or []
            if isinstance(all_rounds, dict): all_rounds = list(all_rounds.values())
            all_rounds.append(done_round)

            if winner:
              current_wins = fb_get(f"sb_users/{winner}/totalWins") or 0
              fb_patch(f"sb_users/{winner}", {"totalWins": current_wins + 1})

            fb_put("sb_rounds",     all_rounds)
            fb_put("sb_current",    done_round)
            fb_put("sb_last_alarm", alarm_ts)
            if winner and winner in bets:
              fb_put("sb_last_winner", {
                "uid": winner, "alarmAt": alarm_ts,
                "betTs": bets[winner].get("ts"), "processedAt": now
              })
            winner_name = (fb_get(f"sb_users/{winner}/displayName") or winner) if winner else "—"
            print(f"Round closed! Winner: {winner_name} (±{round(min_diff/1000)}s)")

          # ── Open new round on end-of-event ────────────────────────────────────
          def open_new_round():
            current = fb_get("sb_current")
            if current and current.get("open"):
              print("Round already open — skipping"); return

            now = int(time.time() * 1000)
            new_round = {
              "id": f"r{now}", "createdAt": now, "open": True, "bets": {},
              "openedAfterAlarm": True, "bettingDeadline": now + 3600000
            }
            fb_put("sb_current", new_round)
            print(f"New round opened: r{now}")

          # ── Main ──────────────────────────────────────────────────────────────
          last_id = fb_get("sb_tg_offset") or 0
          print(f"Last processed message ID: {last_id}")

          try:
            page = fetch_channel()
          except Exception as e:
            print(f"Failed to fetch t.me/s/{CHANNEL}: {e}"); sys.exit(0)

          messages = parse_messages(page)
          print(f"Found {len(messages)} messages on page, last_id={last_id}")

          new_max_id = last_id
          for msg_id, text, ts_ms in messages:
            if msg_id <= last_id:
              continue

            new_max_id = max(new_max_id, msg_id)
            print(f"[{msg_id}] {text[:100]!r}")

            if ALARM_KEYWORD in text and ALARM_CITY in text:
              print(f"ROCKET ALARM in {ALARM_CITY}!")
              close_round(ts_ms)

            elif END_KEYWORD in text:
              print("END OF EVENT detected!")
              open_new_round()

          if new_max_id > last_id:
            fb_put("sb_tg_offset", new_max_id)
            print(f"Offset updated: {last_id} → {new_max_id}")
          else:
            print("No new messages.")

          print("Done.")
          PYEOF
