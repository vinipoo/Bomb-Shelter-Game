name: Integration Test — GitHub → oref → Firebase

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Install cloudscraper
        run: pip install cloudscraper -q

      - name: Fetch oref alert and write to Firebase
        run: |
          python3 << 'PYEOF'
          import json, time, cloudscraper

          FIREBASE_URL = "https://shelter-bet-default-rtdb.firebaseio.com"
          SECRET       = "${{ secrets.FIREBASE_DB_SECRET }}"
          OREF_URL     = "https://www.oref.org.il/WarningMessages/alert/alerts.json"

          now = int(time.time() * 1000)

          # Step 1 — Fetch alerts.json bypassing Cloudflare protection
          print("Fetching alerts.json via cloudscraper...")
          oref_status = "error"
          oref_raw    = None
          try:
            scraper = cloudscraper.create_scraper()
            scraper.headers.update({
              "Referer": "https://www.oref.org.il/",
              "X-Requested-With": "XMLHttpRequest",
              "Accept": "application/json, text/plain, */*",
              "Accept-Language": "he-IL,he;q=0.9,en-US;q=0.8,en;q=0.7",
            })
            r = scraper.get(OREF_URL, timeout=15)
            print(f"HTTP status: {r.status_code}")
            if r.status_code == 200:
              oref_raw    = r.content.decode("utf-8").lstrip("\ufeff").strip()
              oref_status = "ok"
              print(f"oref response: {oref_raw[:200]}")
            else:
              print(f"oref fetch FAILED: HTTP {r.status_code}")
              print(f"Response body: {r.text[:300]}")
          except Exception as e:
            print(f"oref fetch FAILED: {e}")

          # Step 2 — Parse response
          alert_data = None
          if oref_raw and oref_raw not in ("", "null", "[]"):
            try:
              alert_data = json.loads(oref_raw)
              print(f"Active alert found: {alert_data.get('title','')} — {alert_data.get('data',[])}")
            except Exception as e:
              print(f"Parse error: {e}")
          else:
            print("No active alert at time of test (normal)")

          # Step 3 — Write result to Firebase
          result = {
            "testedAt":   now,
            "orefStatus": oref_status,
            "alertData":  alert_data,
            "rawSample":  (oref_raw or "")[:500],
          }
          body = json.dumps(result).encode("utf-8")
          req  = urllib.request.Request(
            f"{FIREBASE_URL}/sb_integration_test.json?auth={SECRET}",
            data=body, method="PUT",
            headers={"Content-Type": "application/json"}
          )
          try:
            with urllib.request.urlopen(req, timeout=10) as r:
              print(f"Firebase write: OK ({r.status})")
          except Exception as e:
            print(f"Firebase write FAILED: {e}")
            exit(1)

          print("Integration test complete.")
          PYEOF
